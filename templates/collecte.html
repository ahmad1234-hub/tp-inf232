{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Collecte des prix (Marchés de Yaoundé)</h3>
            </div>
            <div class="card-body p-4">
                <form action="/ajouter" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nom de la denrée</label>
                        <input type="text" name="produit" class="form-control" placeholder="ex: Tomate, Riz" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Marché de Yaoundé</label>
                        <select name="marche" class="form-control">
                            <option value="Mokolo">Mokolo</option>
                            <option value="Mfoundi">Mfoundi</option>
                            <option value="Édirola">Édirola</option>
                            <option value="Acacia">Acacia</option>
                            <option value="Marché Central">Marché Central</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Prix (FCFA)</label>
                        <input type="number" name="prix" class="form-control" placeholder="ex: 500" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">Enregistrer la donnée</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
